<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HORA – Focus Area</title>
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #d6f5f4 0%, #b8eceb 50%, #c4f0ef 100%);
      font-family: 'Encode Sans SC', sans-serif;
      overflow: hidden;
      padding: 52px 28px 28px;
    }

    h1 {
      font-size: 32px;
      font-weight: 300;
      color: #2d8a8d;
      letter-spacing: 1px;
      margin-bottom: 36px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      border-radius: 20px;
      height: 200px;
      background: linear-gradient(160deg, #c8eeee 0%, #9dd8d8 100%);
      display: flex;
      align-items: flex-end;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border 0.15s ease;
      border: 2px solid transparent;
      box-shadow: 0 4px 20px rgba(100, 180, 185, 0.1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 60%);
      border-radius: inherit;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 28px rgba(100, 180, 185, 0.2);
    }

    .card.selected {
      border: 2px solid #4aa8c0;
      box-shadow: 0 0 0 1px rgba(74, 168, 192, 0.3), 0 8px 28px rgba(74, 168, 192, 0.2);
    }

    .card-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.95);
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* Continue button */
    .btn-continue {
      margin-top: 32px;
      width: 100%;
      background: rgba(100, 185, 188, 0.25);
      border: 1.5px solid rgba(100, 185, 188, 0.4);
      border-radius: 50px;
      padding: 14px;
      font-family: 'Encode Sans SC', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #1a6568;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, opacity 0.3s, transform 0.3s;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .btn-continue.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .btn-continue:hover {
      background: rgba(100, 185, 188, 0.4);
    }

    @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: pageIn 0.35s ease both; }
    body.page-out { opacity: 0 !important; transition: opacity 0.25s ease !important; animation: none !important; }
  </style>
</head>
<body>

  <h1>Focus area</h1>

  <div class="grid">
    <div class="card selected" data-area="love">
      <span class="card-label">Love</span>
    </div>
    <div class="card" data-area="work">
      <span class="card-label">Work</span>
    </div>
    <div class="card" data-area="health">
      <span class="card-label">Health</span>
    </div>
    <div class="card" data-area="social">
      <span class="card-label">Social</span>
    </div>
  </div>

  <button class="btn-continue" id="continueBtn">Continue</button>

  <script>
    function navigate(url) {
      document.body.classList.add('page-out');
      setTimeout(() => { window.location.href = url; }, 260);
    }

    const params = new URLSearchParams(window.location.search);
    const bday = `name=${encodeURIComponent(params.get('name')||'')}&day=${params.get('day')||''}&month=${encodeURIComponent(params.get('month')||'')}&year=${params.get('year')||''}`;

    const cards = document.querySelectorAll('.card');
    const btn   = document.getElementById('continueBtn');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        cards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        btn.classList.add('visible');
      });
    });

    btn.addEventListener('click', () => {
      const selected = document.querySelector('.card.selected');
      const focus = selected ? selected.dataset.area : 'love';
      navigate(`home.html?${bday}&focus=${focus}`);
    });
  </script>

</body>
</html>
