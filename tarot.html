<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HORA – Tarot Reading</title>
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      background:linear-gradient(180deg,#c9f0ef 0%,#a8e4e3 40%,#b8eceb 100%);
      font-family:'Encode Sans SC',sans-serif;
      overflow-y:auto;
      padding-bottom:48px;
    }

    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:44px 28px 8px;
    }
    .btn-back {
      display:flex; align-items:center; gap:6px; text-decoration:none; color:#1a6568;
      font-size:12px; font-weight:600; letter-spacing:1.5px;
      text-transform:uppercase; opacity:0.75; transition:opacity 0.2s;
    }
    .btn-back:hover { opacity:1; }
    .btn-back svg { width:18px;height:18px;stroke:#3d9093;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round; }
    .menu-icon { width:20px;height:14px;display:flex;flex-direction:column;justify-content:space-between;opacity:0.5; }
    .menu-icon span { display:block;height:2px;background:#3d9093;border-radius:2px; }

    .title-wrap { padding:4px 28px 4px; }
    .page-title { font-size:22px;font-weight:700;letter-spacing:3px;color:#1a6568;text-transform:uppercase; }
    .page-sub   { font-size:11px;letter-spacing:2.5px;color:rgba(29, 110, 113, 0.89);text-transform:uppercase;margin-top:4px; }

    /* Counter */
    .counter {
      display:flex; align-items:center; justify-content:center;
      gap:10px; margin:16px 0 20px;
      font-size:11px; letter-spacing:2px; color:rgba(29, 110, 113, 0.91); text-transform:uppercase;
    }
    .counter-dots { display:flex; gap:6px; }
    .counter-dot {
      width:10px; height:10px; border-radius:50%;
      border:1.5px solid rgba(61,144,147,0.4);
      background:transparent; transition:background 0.3s,border-color 0.3s;
    }
    .counter-dot.filled { background:#c9a84c; border-color:#c9a84c; }

    /* Card grid */
    .card-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      padding:0 28px;
      max-width:500px;
      margin:0 auto;
    }

    /* Card flip */
    .card-wrap {
      aspect-ratio:2/3;
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);
      border-radius:12px;
    }

    .card-wrap.flipped .card-inner { transform:rotateY(180deg); }

    /* Disabled — can't flip anymore */
    .card-wrap.disabled {
      cursor:not-allowed;
      opacity:0.45;
    }

    .card-face, .card-back {
      position:absolute; inset:0;
      border-radius:12px;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }

    /* ── CARD BACK — decorative dark navy ── */
    .card-back {
      background:linear-gradient(145deg,#0f1f3d,#1a3a5c);
      border:2px solid #c9a84c;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px;
      box-shadow:0 8px 28px rgba(0,0,0,0.3);
      overflow:hidden;
    }

    .card-back-inner {
      width:78%; height:78%;
      border:1.5px solid rgba(201,168,76,0.35);
      border-radius:8px;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:6px;
    }

    .card-back-star { font-size:28px; color:rgba(201,168,76,0.6); }
    .card-back-dots {
      display:flex; gap:4px;
    }
    .card-back-dots span {
      width:4px; height:4px; border-radius:50%;
      background:rgba(201,168,76,0.35);
    }
    .card-back-text {
      font-size:7px; letter-spacing:3px;
      color:rgba(201,168,76,0.45); text-transform:uppercase;
    }

    /* ── CARD FACE — real tarot image ── */
    .card-face {
      transform:rotateY(180deg);
      background:#fdf6e3;
      border:2px solid #c9a84c;
      display:flex; flex-direction:column;
      box-shadow:0 8px 28px rgba(0,0,0,0.25);
      overflow:hidden;
    }

    .card-face-img {
      flex:1;
      width:100%;
      object-fit:cover;
      object-position:top;
      display:block;
    }

    .card-face-name {
      padding:7px 6px 9px;
      text-align:center;
      font-size:8px; font-weight:700; letter-spacing:1.5px;
      color:#1a3a5c; text-transform:uppercase;
      border-top:1px solid rgba(201,168,76,0.4);
      background:#fdf6e3;
      flex-shrink:0;
    }

    /* Gold glow on flipped card */
    .card-wrap.flipped .card-inner {
      box-shadow:0 0 0 3px #c9a84c, 0 8px 28px rgba(201,168,76,0.35);
    }

    /* See Reading button */
    .btn-reading {
      display:block;
      margin:24px auto 0;
      width:calc(100% - 56px);
      max-width:444px;
      background:rgba(61,144,147,0.25);
      border:1.5px solid rgba(61,144,147,0.4);
      border-radius:50px; padding:14px;
      font-family:'Encode Sans SC',sans-serif;
      font-size:13px; font-weight:600; letter-spacing:2px;
      color:#1a6568; text-transform:uppercase;
      cursor:pointer;
      opacity:0; transform:translateY(8px);
      transition:opacity 0.3s,transform 0.3s,background 0.2s;
      pointer-events:none;
    }
    .btn-reading.visible { opacity:1;transform:translateY(0);pointer-events:auto; }
    .btn-reading:hover   { background:rgba(61,144,147,0.4); }
  </style>
</head>
<body>

  <div class="header">
    <a class="btn-back" id="backBtn" href="home.html">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="menu-icon"><span></span><span></span><span></span></div>
  </div>

  <div class="title-wrap">
    <div class="page-title">Tarot Reading</div>
    <div class="page-sub">Flip 3 Cards</div>
  </div>

  <div class="counter">
    <div class="counter-dots">
      <div class="counter-dot" id="dot0"></div>
      <div class="counter-dot" id="dot1"></div>
      <div class="counter-dot" id="dot2"></div>
    </div>
    <span id="counterText">0 / 3 Flipped</span>
  </div>

  <div class="card-grid" id="cardGrid"></div>
  <button class="btn-reading" id="btnReading">See Your Reading</button>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const name     = params.get('name')  || '';
    const day      = params.get('day')   || '';
    const monthStr = params.get('month') || '';
    const year     = params.get('year')  || '';
    const bdayQ    = `name=${encodeURIComponent(name)}&day=${day}&month=${encodeURIComponent(monthStr)}&year=${year}`;
    document.getElementById('backBtn').href = `home.html?${bdayQ}`;

    // ── Real RWS tarot card images (Wikimedia Commons — public domain) ──
    const BASE_W = 'https://upload.wikimedia.org/wikipedia/commons/';

    const deck = [
      // Major Arcana — Wikimedia RWS
      { id:'maj0',  name:'The Fool',          img: BASE_W+'0/03/RWS_Tarot_00_Fool.jpg',                type:'Major', keywords:'New beginnings, innocence, adventure',        up:'A leap of faith awaits. Embrace new beginnings with an open heart — the universe supports your journey.', rev:'Recklessness, poor judgement or a lack of direction clouding your path forward.' },
      { id:'maj1',  name:'The Magician',       img: BASE_W+'d/de/RWS_Tarot_01_Magician.jpg',           type:'Major', keywords:'Willpower, creation, manifestation',           up:'You have all the tools you need. Channel your focus and manifest your intentions into reality.', rev:'Manipulation, poor planning or untapped talents being used for the wrong purpose.' },
      { id:'maj2',  name:'The High Priestess', img: BASE_W+'8/88/RWS_Tarot_02_High_Priestess.jpg',     type:'Major', keywords:'Intuition, mystery, inner knowledge',          up:'Listen to your inner voice. Hidden truths are surfacing — trust your intuition above all else.', rev:'Secrets, disconnection from intuition or information being withheld from you.' },
      { id:'maj3',  name:'The Empress',        img: BASE_W+'d/d3/RWS_Tarot_03_Empress.jpg',            type:'Major', keywords:'Abundance, nurturing, fertility, beauty',      up:'A time of growth and abundance. Nature and creativity flow freely — nurture what you love.', rev:'Creative block, dependence or neglect of self and others around you.' },
      { id:'maj4',  name:'The Emperor',        img: BASE_W+'c/c3/RWS_Tarot_04_Emperor.jpg',            type:'Major', keywords:'Authority, structure, foundation, power',      up:'Take charge and establish order. Your leadership and determination will bring lasting results.', rev:'Domination, excessive control, rigidity or an abuse of authority.' },
      { id:'maj5',  name:'The Hierophant',     img: BASE_W+'8/8d/RWS_Tarot_05_Hierophant.jpg',         type:'Major', keywords:'Spiritual wisdom, tradition, conformity',      up:'Seek wisdom from tradition or a trusted mentor. Spiritual growth comes through learning.', rev:'Personal beliefs, freedom from convention, challenging institutions that no longer serve you.' },
      { id:'maj6',  name:'The Lovers',         img: BASE_W+'3/3a/TheLovers.jpg',                        type:'Major', keywords:'Love, harmony, relationships, choices',        up:'A meaningful connection or important choice is at hand. Follow your heart with clear intention.', rev:'Self-love, disharmony, misaligned values or a difficult decision weighing on you.' },
      { id:'maj7',  name:'The Chariot',        img: BASE_W+'9/9b/RWS_Tarot_07_Chariot.jpg',            type:'Major', keywords:'Control, willpower, success, determination',   up:'Press forward with confidence. Focus and determination will carry you through any obstacle.', rev:'Lack of direction, opposition or aggression undermining your progress.' },
      { id:'maj8',  name:'Strength',           img: BASE_W+'f/f5/RWS_Tarot_08_Strength.jpg',           type:'Major', keywords:'Courage, patience, inner strength, compassion',up:'True power comes from within. Approach challenges with compassion and gentle strength.', rev:'Self-doubt, low energy or raw emotion holding you back from your potential.' },
      { id:'maj9',  name:'The Hermit',         img: BASE_W+'4/4d/RWS_Tarot_09_Hermit.jpg',             type:'Major', keywords:'Soul-searching, introspection, inner guidance',up:'Step back and look within. Quiet reflection will illuminate your path and reveal your truth.', rev:'Isolation, loneliness or rejection of the guidance being offered to you.' },
      { id:'maj10', name:'Wheel of Fortune',   img: BASE_W+'3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg',  type:'Major', keywords:'Good luck, karma, life cycles, destiny',       up:'The wheel is turning in your favour. A new, fortunate cycle is beginning now.', rev:'Bad luck, resistance to change or a turning point that feels beyond your control.' },
      { id:'maj11', name:'Justice',            img: BASE_W+'e/e0/RWS_Tarot_11_Justice.jpg',            type:'Major', keywords:'Justice, fairness, truth, cause and effect',   up:'Balance and truth prevail. Act with integrity and the universe will restore equilibrium.', rev:'Unfairness, lack of accountability or consequences of past actions catching up.' },
      { id:'maj12', name:'The Hanged Man',     img: BASE_W+'2/2b/RWS_Tarot_12_Hanged_Man.jpg',        type:'Major', keywords:'Pause, surrender, new perspectives',           up:'Let go and gain a new vantage point. Surrender opens doors that force cannot unlock.', rev:'Delays, resistance or an inability to release what no longer serves you.' },
      { id:'maj13', name:'Death',              img: BASE_W+'d/d7/RWS_Tarot_13_Death.jpg',              type:'Major', keywords:'Endings, beginnings, transformation',          up:'An ending makes way for powerful transformation. Release the old to welcome what is aligned.', rev:'Resistance to change or fear of endings blocking your growth.' },
      { id:'maj14', name:'Temperance',         img: BASE_W+'f/f8/RWS_Tarot_14_Temperance.jpg',        type:'Major', keywords:'Balance, moderation, patience, purpose',       up:'Find the middle path. Patience and balance bring the harmony and healing you seek.', rev:'Imbalance, excess or realignment of priorities required now.' },
      { id:'maj15', name:'The Devil',          img: BASE_W+'5/55/RWS_Tarot_15_Devil.jpg',              type:'Major', keywords:'Shadow self, attachment, restriction',          up:'Examine what binds you. Awareness of your patterns is the first step to lasting freedom.', rev:'Releasing limiting beliefs, detachment from what no longer serves you.' },
      { id:'maj16', name:'The Tower',          img: BASE_W+'5/53/RWS_Tarot_16_Tower.jpg',              type:'Major', keywords:'Sudden change, upheaval, revelation',          up:'Unexpected change shakes the foundation — what remains will be truer and stronger.', rev:'Personal transformation, fear of change or a delayed upheaval building beneath.' },
      { id:'maj17', name:'The Star',           img: BASE_W+'d/db/RWS_Tarot_17_Star.jpg',               type:'Major', keywords:'Hope, faith, renewal, spirituality',           up:'After the storm comes light. Hope, healing and inspiration flow toward you like starlight.', rev:'Lack of faith, despair or disconnection from your sense of hope and purpose.' },
      { id:'maj18', name:'The Moon',           img: BASE_W+'7/7f/RWS_Tarot_18_Moon.jpg',               type:'Major', keywords:'Illusion, fear, intuition, the unconscious',   up:'Not all is as it seems. Trust your instincts and look beyond illusions to the deeper truth.', rev:'Release of fear, repressed emotion lifting or hidden truths coming to light.' },
      { id:'maj19', name:'The Sun',            img: BASE_W+'1/17/RWS_Tarot_19_Sun.jpg',                type:'Major', keywords:'Positivity, warmth, success, vitality',        up:'Radiant energy surrounds you. Confidence, clarity, joy and success are yours today.', rev:'Temporarily blocked from your natural joy, radiance or inner child.' },
      { id:'maj20', name:'Judgement',          img: BASE_W+'d/dd/RWS_Tarot_20_Judgement.jpg',          type:'Major', keywords:'Rebirth, inner calling, awakening',             up:'A moment of profound awakening. Answer your calling and step boldly into your purpose.', rev:'Self-doubt, ignoring the call or refusing to learn the lessons being presented.' },
      { id:'maj21', name:'The World',          img: BASE_W+'f/ff/RWS_Tarot_21_World.jpg',              type:'Major', keywords:'Completion, accomplishment, wholeness',         up:'A cycle is complete. Celebrate how far you have come — wholeness and fulfilment are yours.', rev:'Seeking closure, shortcuts being taken or an incomplete journey needing attention.' },
      // Minor Arcana — Wikimedia Commons RWS
      { id:'w1',  name:'Ace of Wands',        img: BASE_W+'1/11/Wands01.jpg', type:'Wands',     keywords:'Inspiration, new opportunities, growth',       up:'A spark of inspiration ignites. Seize this creative energy and take decisive action toward your passion.', rev:'Delays, creative blocks or lack of motivation preventing a fresh start.' },
      { id:'w6',  name:'Six of Wands',        img: BASE_W+'3/38/Wands06.jpg', type:'Wands',     keywords:'Success, public recognition, confidence',      up:'Victory is yours. Public recognition arrives and your confidence inspires those around you.', rev:'Private achievement or a fall from a position of pride.' },
      { id:'w8',  name:'Eight of Wands',      img: BASE_W+'e/e0/Wands08.jpg', type:'Wands',     keywords:'Movement, fast change, action, alignment',     up:'Things are moving fast now. Swift action brings alignment — be ready to receive what is rushing toward you.', rev:'Delays, frustration or losing momentum on something needing consistent energy.' },
      { id:'c1',  name:'Ace of Cups',         img: BASE_W+'3/36/Cups01.jpg',  type:'Cups',      keywords:'Love, new relationships, compassion',          up:'An outpouring of love and emotional energy. Open your heart — new connections and joy are arriving.', rev:'Self-love, repressed emotions or creative blocks preventing your heart from opening.' },
      { id:'c2',  name:'Two of Cups',         img: BASE_W+'2/2f/Cups02.jpg',  type:'Cups',      keywords:'Partnership, mutual attraction, unified love',  up:'A deep and meaningful connection is forming. Mutual understanding and harmony define this bond.', rev:'Disharmony or an imbalance of power in an important relationship.' },
      { id:'c10', name:'Ten of Cups',         img: BASE_W+'8/8f/Cups10.jpg',  type:'Cups',      keywords:'Divine love, blissful relationships, harmony',  up:'Deep fulfilment in relationships. True happiness and emotional harmony surround you now.', rev:'Disconnection or searching for the meaning of true happiness.' },
      { id:'s1',  name:'Ace of Swords',       img: BASE_W+'1/1a/Swords01.jpg',type:'Swords',    keywords:'Breakthroughs, mental clarity, truth',          up:'A breakthrough arrives with clarity and truth. Cut through confusion — the answer is now clear.', rev:'Inner clarity or a powerful idea needing refinement before it can fully emerge.' },
      { id:'s7',  name:'Seven of Swords',     img: BASE_W+'3/34/Swords07.jpg',type:'Swords',    keywords:'Betrayal, deception, strategy, stealth',        up:'Strategy and discretion are needed. Be mindful of who you trust — not everyone has honest intentions.', rev:'Coming clean or finally acknowledging a truth you have been avoiding.' },
      { id:'p1',  name:'Ace of Pentacles',    img: BASE_W+'f/fd/Pents01.jpg', type:'Pentacles', keywords:'New financial opportunity, manifestation',      up:'A new material opportunity presents itself. Plant this seed with intention — abundance follows.', rev:'Lost opportunity, scarcity mindset or failing to act on a promising new beginning.' },
      { id:'p9',  name:'Nine of Pentacles',   img: BASE_W+'8/8f/Pents09.jpg', type:'Pentacles', keywords:'Abundance, luxury, self-sufficiency',           up:'You have created something beautiful through hard work. Enjoy the abundance you have earned.', rev:'Self-worth or financial setbacks reminding you that inner wealth matters most.' },
      { id:'p10', name:'Ten of Pentacles',    img: BASE_W+'a/a7/Pents10.jpg', type:'Pentacles', keywords:'Wealth, family, long-term success, legacy',     up:'Legacy and lasting abundance. The foundations you built support not just you but those you love.', rev:'Family disputes, financial instability beneath a surface of prosperity.' },
    ];

    // ── Shuffle & pick 6 ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const hand    = shuffle(deck).slice(0, 6);
    const MAX     = 3;
    let   flipped = [];

    const grid = document.getElementById('cardGrid');
    const btn  = document.getElementById('btnReading');

    hand.forEach(card => {
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';
      wrap.dataset.id = card.id;

      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-back">
            <div class="card-back-inner">
              <span class="card-back-star">✦</span>
              <div class="card-back-dots">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
              <span class="card-back-text">Hora</span>
            </div>
          </div>
          <div class="card-face">
            <img class="card-face-img" src="${card.img}" alt="${card.name}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
            <div style="display:none;flex:1;align-items:center;justify-content:center;
                        background:linear-gradient(160deg,#0f1f3d,#1a3a5c);font-size:36px;">
              ${card.type==='Wands'?'🔥':card.type==='Cups'?'💧':card.type==='Swords'?'💨':card.type==='Pentacles'?'🌱':'✦'}
            </div>
            <div class="card-face-name">${card.name}</div>
          </div>
        </div>
      `;

      wrap.addEventListener('click', () => {
        // Already flipped or disabled — do nothing
        if (wrap.classList.contains('flipped') || wrap.classList.contains('disabled')) return;
        // Max reached
        if (flipped.length >= MAX) return;

        wrap.classList.add('flipped');
        flipped.push(card.id);
        updateCounter();
      });

      grid.appendChild(wrap);
    });

    function updateCounter() {
      const n = flipped.length;
      for (let i = 0; i < MAX; i++) {
        document.getElementById(`dot${i}`).classList.toggle('filled', i < n);
      }
      document.getElementById('counterText').textContent = `${n} / ${MAX} Flipped`;

      if (n >= MAX) {
        btn.classList.add('visible');
        // Disable all unflipped cards
        document.querySelectorAll('.card-wrap:not(.flipped)').forEach(c => c.classList.add('disabled'));
      }
    }

    btn.addEventListener('click', () => {
      window.location.href = `tarotresult.html?${bdayQ}&cards=${encodeURIComponent(flipped.join(','))}`;
    });
  </script>
</body>
</html>
