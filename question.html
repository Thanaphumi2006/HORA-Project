<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HORA – Question</title>
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #c9f0ef 0%, #a8e4e3 40%, #b8eceb 100%);
      font-family: 'Encode Sans SC', sans-serif;
      overflow: hidden;
      cursor: pointer;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .question-text {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .question-text h1 {
      font-size: 58px;
      font-weight: 300;
      color: rgba(29, 110, 113, 0.95);
      letter-spacing: 2px;
      text-align: center;
    }

    /* Progress bar */
    .progress-bar {
      margin-top: 20px;
      width: 220px;
      height: 2px;
      background: rgba(61, 144, 147, 0.18);
      border-radius: 2px;
      position: relative;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 6px rgba(100, 180, 185, 0.5);
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    /* Skip button — centered below */
    .btn-skip {
      margin-top: 48px;
      font-family: 'Encode Sans SC', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(29, 110, 113, 0.91);
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 24px;
      transition: color 0.2s;
      z-index: 10;
    }

    .btn-skip:hover { color: #1a6568; }

    @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: pageIn 0.35s ease both; }
    body.page-out { opacity: 0 !important; transition: opacity 0.25s ease !important; animation: none !important; }
  </style>
</head>
<body>

  <div class="question-text">
    <h1>Question</h1>
    <div class="progress-bar">
      <div class="progress-dot"></div>
    </div>
    <button class="btn-skip" id="skipBtn">Skip</button>
  </div>

  <script>
    function navigate(url) {
      document.body.classList.add('page-out');
      setTimeout(() => { window.location.href = url; }, 260);
    }

    const params = new URLSearchParams(window.location.search);
    const bday = `name=${encodeURIComponent(params.get('name')||'')}&day=${params.get('day')||''}&month=${encodeURIComponent(params.get('month')||'')}&year=${params.get('year')||''}`;

    // Skip → home page
    document.getElementById('skipBtn').addEventListener('click', e => {
      e.stopPropagation();
      navigate(`home.html?${bday}`);
    });

    // Click anywhere else → focus area page
    document.body.addEventListener('click', () => {
      navigate(`focus.html?${bday}`);
    });
  </script>

</body>
</html>
