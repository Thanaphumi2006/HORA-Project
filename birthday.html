<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HORA – Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #c9f0ef 0%, #a8e4e3 40%, #b8eceb 100%);
      font-family: 'Encode Sans SC', sans-serif;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 360px;
      padding: 0 24px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: #1a6568;
      text-transform: uppercase;
    }

    /* Picker card */
    .picker-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 4px 24px rgba(100, 180, 185, 0.15);
    }

    /* Highlight band for selected row */
    .picker-card::before {
      content: '';
      position: absolute;
      left: 16px; right: 16px;
      top: 50%;
      transform: translateY(-50%);
      height: 44px;
      background: rgba(100, 185, 188, 0.18);
      border: 1px solid rgba(100, 185, 188, 0.3);
      border-radius: 14px;
      pointer-events: none;
      z-index: 2;
    }

    /* Fade edges */
    .picker-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(200, 240, 240, 0.7) 0%,
          transparent 30%,
          transparent 70%,
          rgba(180, 236, 235, 0.7) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .picker-columns {
      display: flex;
      height: 220px;
    }

    .picker-col {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 88px 0;
    }

    .picker-col::-webkit-scrollbar { display: none; }

    .picker-item {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-size: 15px;
      font-weight: 400;
      color: #1a6568;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }

    /* Continue button */
    .btn-continue {
      margin-top: 12px;
      background: rgba(100, 185, 188, 0.25);
      border: 1.5px solid rgba(100, 185, 188, 0.4);
      border-radius: 50px;
      padding: 12px 48px;
      font-family: 'Encode Sans SC', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #1a6568;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-continue:hover {
      background: rgba(100, 185, 188, 0.4);
    }

    /* Back button */
    .btn-back {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Encode Sans SC', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      color: #1a6568;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    .btn-back:hover { opacity: 1; }

    .btn-back svg {
      width: 16px;
      height: 16px;
      stroke: #3d9093;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── SOLAR SYSTEM COMET ── */
    .solar {
      position: fixed;
      right: -200px;
      bottom: -200px;
      width: 400px;
      height: 400px;
      pointer-events: none;
      opacity: 0.35;
    }

    /* Sun / planet core */
    .solar .sun {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #a8e8e8, #5aabae);
      box-shadow: 0 0 18px 6px rgba(90, 171, 174, 0.35);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Orbit ring */
    .solar .orbit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(90, 171, 174, 0.25);
      animation: spin 4s linear infinite;
    }

    /* Comet head */
    .solar .orbit::before {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff, #7bbcbf);
      box-shadow:
        0 0 8px 3px rgba(255, 255, 255, 0.8),
        0 0 16px 6px rgba(123, 188, 191, 0.5);
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Comet tail */
    .solar .orbit::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(to left, rgba(255,255,255,0.6), transparent);
      top: -3px;
      left: calc(50% - 36px);
      transform-origin: right center;
    }

    /* Second smaller orbit */
    .solar .orbit2 {
      position: absolute;
      inset: 28px;
      border-radius: 50%;
      border: 1px solid rgba(90, 171, 174, 0.15);
      animation: spin 2.5s linear infinite reverse;
    }

    .solar .orbit2::before {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 0 6px 2px rgba(123, 188, 191, 0.5);
      bottom: -3px;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: pageIn 0.35s ease both; }
    body.page-out { opacity: 0 !important; transition: opacity 0.25s ease !important; animation: none !important; }
  </style>
</head>
<body>

  <!-- Solar system comet decoration -->
  <div class="solar">
    <div class="sun"></div>
    <div class="orbit"></div>
    <div class="orbit2"></div>
  </div>

  <a class="btn-back" id="backBtn" href="name.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>

  <div class="page">
    <span class="label">Enter Birthday</span>

    <div class="picker-card">
      <div class="picker-columns">
        <!-- Day -->
        <div class="picker-col" id="col-day"></div>
        <!-- Month -->
        <div class="picker-col" id="col-month"></div>
        <!-- Year -->
        <div class="picker-col" id="col-year"></div>
      </div>
    </div>

    <button class="btn-continue" id="continueBtn">Continue</button>
  </div>

  <script>
    function navigate(url) {
      document.body.classList.add('page-out');
      setTimeout(() => { window.location.href = url; }, 260);
    }

    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function fillCol(id, items, defaultIndex) {
      const col = document.getElementById(id);
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'picker-item';
        div.textContent = item;
        col.appendChild(div);
      });
      requestAnimationFrame(() => {
        col.scrollTop = defaultIndex * 44;
      });
    }

    const days = Array.from({length: 31}, (_, i) => i + 1);
    const currentYear = new Date().getFullYear();
    const years = Array.from({length: currentYear - 1899}, (_, i) => currentYear - i);

    const today = new Date();
    fillCol('col-day',   days,   today.getDate() - 1);
    fillCol('col-month', months, today.getMonth());
    fillCol('col-year',  years,  0);

    function getSelected(id, items) {
      const col = document.getElementById(id);
      const index = Math.round(col.scrollTop / 44);
      return items[Math.min(index, items.length - 1)];
    }

    // Preserve name on back button
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || '';
    document.getElementById('backBtn').href = `name.html?name=${encodeURIComponent(name)}`;
    document.getElementById('backBtn').addEventListener('click', e => {
      e.preventDefault();
      navigate(e.currentTarget.href);
    });

    document.getElementById('continueBtn').addEventListener('click', () => {
      const day   = getSelected('col-day',   days);
      const month = getSelected('col-month', months);
      const year  = getSelected('col-year',  years);
      const p = new URLSearchParams(window.location.search);
      const name = p.get('name') || '';
      navigate(`question.html?name=${encodeURIComponent(name)}&day=${day}&month=${encodeURIComponent(month)}&year=${year}`);
    });
  </script>

</body>
</html>
