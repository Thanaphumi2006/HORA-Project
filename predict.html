    // ── Life Path Number from birthday (numerology) ──
    function lifePathNumber(d, m, y) {
      const digits = `${d}${String(m).padStart(2,'0')}${y}`.split('').map(Number);
      let sum = digits.reduce((a, b) => a + b, 0);
      while (sum > 9 && sum !== 11 && sum !== 22) {
        sum = String(sum).split('').reduce((a, c) => a + parseInt(c), 0);
      }
      return sum;
    }

    const lpn = lifePathNumber(day, monthNum, year);

    // ── Lucky colors by Life Path Number ──
    const lpnColors = {
      1:  [{ color:'#E53935', name:'Red',          meaning:'Leadership & Action',      action:'Take the first step on something you have been delaying — your energy is at its peak.' },
           { color:'#FFA726', name:'Gold',          meaning:'Confidence & Success',     action:'Dress in a bold colour today — it amplifies your natural magnetic presence.' }],
      2:  [{ color:'#F8F8F8', name:'White',         meaning:'Purity & Harmony',         action:'Spend five quiet minutes in stillness — your best insights come in the calm.' },
           { color:'#A5D6A7', name:'Cream Green',   meaning:'Growth & Balance',         action:'Reach out to someone who brings you peace — connection recharges you today.' }],
      3:  [{ color:'#FDD835', name:'Yellow',        meaning:'Creativity & Joy',         action:'Express yourself — write, draw, or speak your truth. Your voice matters today.' },
           { color:'#CE93D8', name:'Lavender',      meaning:'Imagination & Spirit',     action:'Surround yourself with colour and beauty — creativity is your currency today.' }],
      4:  [{ color:'#42A5F5', name:'Blue',          meaning:'Stability & Trust',        action:'Organise one important area of your life — structure creates freedom for you.' },
           { color:'#8D6E63', name:'Earth Brown',   meaning:'Grounding & Strength',     action:'Work with your hands or connect with nature — it anchors your focus.' }],
      5:  [{ color:'#E0E0E0', name:'Silver',        meaning:'Freedom & Adaptability',   action:'Say yes to something spontaneous today — your best experiences come from the unexpected.' },
           { color:'#80DEEA', name:'Turquoise',     meaning:'Movement & Change',        action:'Change your environment or routine today — novelty unlocks your energy.' }],
      6:  [{ color:'#F48FB1', name:'Rose Pink',     meaning:'Love & Nurturing',         action:'Do something kind for someone without expecting anything in return — it returns to you.' },
           { color:'#26C6DA', name:'Teal',          meaning:'Balance & Responsibility', action:'Check in on someone close — your care today creates a lasting bond.' }],
      7:  [{ color:'#7B1FA2', name:'Violet',        meaning:'Wisdom & Spirituality',    action:'Spend time in reflection or meditation — answers arrive in the silence.' },
           { color:'#4A148C', name:'Indigo',        meaning:'Intuition & Depth',        action:'Trust the feeling that has been nagging you — your instincts are accurate today.' }],
      8:  [{ color:'#1A237E', name:'Dark Blue',     meaning:'Power & Ambition',         action:'Take decisive action on your most important goal — momentum is on your side.' },
           { color:'#212121', name:'Black',         meaning:'Authority & Mastery',      action:'Present yourself with quiet confidence — your competence speaks louder than words.' }],
      9:  [{ color:'#C62828', name:'Crimson',       meaning:'Compassion & Completion',  action:'Release something that no longer serves you — endings make space for beginnings.' },
           { color:'#FFD54F', name:'Golden Yellow', meaning:'Wisdom & Giving',          action:'Share your knowledge or experience with someone who needs it — your wisdom is your gift.' }],
      11: [{ color:'#F5F5F5', name:'Silver White',  meaning:'Illumination & Vision',    action:'Trust the flashes of insight arriving today — your intuition is operating at a higher level.' },
           { color:'#B39DDB', name:'Pale Violet',   meaning:'Spiritual Clarity',        action:'Meditate or journal first thing — your inner guidance is exceptionally clear today.' }],
      22: [{ color:'#E53935', name:'Red',           meaning:'Master Builder Energy',    action:'Take a concrete step toward your biggest vision today — you have the power to build it.' },
           { color:'#FFA726', name:'Gold',          meaning:'Achievement & Legacy',     action:'Think long-term — the decision you make today has larger consequences than it appears.' }],
    };

    const recs = lpnColors[lpn] || lpnColors[9];
    document.getElementById('lpnLabel').textContent = `Life Path ${lpn} · Lucky Colors`;

    // ── Populate focus-filtered prediction points ──
    const focusPoints = zodiacFocusPredictions[focus] || zodiacFocusPredictions['love'];
    const points = focusPoints[zodiac] || focusPoints['Pisces'];
    document.getElementById('point1').textContent = points[0];
    document.getElementById('point2').textContent = points[1];
    document.getElementById('point3').textContent = points[2];

    const container = document.getElementById('recsContainer');
    recs.forEach(rec => {
      const card = document.createElement('div');
      card.className = 'rec-card';
      card.innerHTML = `
        <div class="rec-color" style="background:${rec.color}"></div>
        <div class="rec-info">
          <div class="rec-label">${rec.name} · ${rec.meaning}</div>
          <div class="rec-text">${rec.action}</div>
        </div>
      `;
      container.appendChild(card);
    });

    // ── Email log helpers ──────────────────────────────────────────────────
    const LOG_KEY = 'hora_email_log';

    function recordSent(email) {
      const log = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
      log.push({ type: 'prediction', email, date: new Date().toISOString() });
      localStorage.setItem(LOG_KEY, JSON.stringify(log));
    }

    function getLastSent() {
      const log = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
      return log.filter(e => e.type === 'prediction').slice(-1)[0] || null;
    }

    function buildPredictionEmail() {
      const p1 = document.getElementById('point1').textContent;
      const p2 = document.getElementById('point2').textContent;
      const p3 = document.getElementById('point3').textContent;
      const colorLines = [...document.querySelectorAll('.rec-label')].map(el => el.textContent);
      const actionLines = [...document.querySelectorAll('.rec-text')].map(el => el.textContent);
      const rLines = colorLines.map((l, i) => `• ${l}\n  ${actionLines[i] || ''}`).join('\n');
      return `HORA DAILY ${focus.toUpperCase()} PREDICTION\n` +
             `══════════════════════════════\n` +
             `Name: ${name || 'You'}  |  Zodiac: ${zodiac}  |  Focus: ${(focusLabels[focus]||focus)}\n` +
             `Date: ${document.getElementById('todayDate').textContent}\n\n` +
             `YOUR PREDICTION\n───────────────\n${p1}\n\n${p2}\n\n${p3}\n\n` +
             `LUCKY COLORS · LIFE PATH ${lpn}\n───────────────────────────\n${rLines}\n\n` +
             `──────────────────────────────\nSent by HORA · Predicting ur Destiny\nhttps://thanaphumi2006.github.io/HORA-Project/`;
    }

    function sendToEmail() {
      const userEmail = document.getElementById('emailInput').value.trim();
      if (!userEmail || !userEmail.includes('@')) {
        document.getElementById('emailStatus').textContent = 'Please enter a valid email address.';
        document.getElementById('emailStatus').className = 'email-status error';
        document.getElementById('emailInput').focus();
        return;
      }

      const btn = document.getElementById('btnSendEmail');
      btn.disabled = true;
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M12 2a10 10 0 1 0 10 10" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"/></svg> Sending...`;
      document.getElementById('emailStatus').textContent = '';

      const sentDate = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      const content  = buildPredictionEmail();

      if (EMAILJS_READY) {
        emailjs.init(EMAILJS_PUBLIC_KEY);
        emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          to_name:  name || 'there',
          to_email: userEmail,
          subject:  `Your HORA ${focusLabels[focus]||'Daily'} Prediction · ${sentDate}`,
          zodiac,
          sent_date: sentDate,
          content,
        })
        .then(() => {
          recordSent(userEmail);
          btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Sent!`;
          document.getElementById('emailStatus').textContent = `Delivered to ${userEmail}`;
          document.getElementById('emailStatus').className = 'email-status success';
          document.getElementById('emailLog').textContent = `Sent on ${sentDate}`;
        })
        .catch(() => {
          btn.disabled = false;
          btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg> Email My Results`;
          document.getElementById('emailStatus').textContent = 'Send failed — check your EmailJS config.';
          document.getElementById('emailStatus').className = 'email-status error';
        });
      } else {
        // Fallback: open mailto in email client
        const sub  = `Your HORA ${focusLabels[focus]||'Daily'} Prediction · ${sentDate}`;
        const body = content.substring(0, 1800);
        window.location.href = `mailto:${userEmail}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
        recordSent(userEmail);
        btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Opening Email App...`;
        document.getElementById('emailStatus').textContent = `Opening your email app for ${userEmail}`;
        document.getElementById('emailStatus').className = 'email-status success';
        document.getElementById('emailLog').textContent = `Sent on ${sentDate}`;
        btn.disabled = true;
      }
    }

    // Pre-fill email input and show last sent date on load
    (function() {
      const saved = sessionStorage.getItem('hora_email') || '';
      if (saved) document.getElementById('emailInput').value = saved;

      const last = getLastSent();
      if (last) {
        const d = new Date(last.date).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        document.getElementById('emailLog').textContent = `Last sent: ${d} → ${last.email}`;
      }
    })();

    document.getElementById('btnSendEmail').addEventListener('click', sendToEmail);

    // Spinner keyframe (reuse if not already defined)
    if (!document.getElementById('emailSpinStyle')) {
      const s = document.createElement('style');
      s.id = 'emailSpinStyle';
      s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
      document.head.appendChild(s);
    }
  </script>

</body>
</html>
